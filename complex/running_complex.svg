<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 250">
  <!-- Complex Running Pitbull -->
  <rect x="0" y="0" width="300" height="250" fill="#f5f5f5"/>
  
  <!-- Detailed Body with muscle definition -->
  <path d="M 70 150 Q 65 165 78 178 Q 90 190 110 188 T 145 185 T 178 190 T 195 182 Q 215 175 212 165 Q 208 158 195 162 L 155 170 Z" 
        fill="none" stroke="#222" stroke-width="2.5" opacity="0.9"/>
  
  <!-- Muscle definition lines -->
  <path d="M 80 158 Q 85 160 90 158" fill="none" stroke="#444" stroke-width="1" opacity="0.6"/>
  <path d="M 95 168 Q 100 166 105 168" fill="none" stroke="#444" stroke-width="1" opacity="0.6"/>
  <path d="M 120 178 Q 125 176 130 178" fill="none" stroke="#444" stroke-width="1" opacity="0.6"/>
  
  <!-- Detailed Head with expression -->
  <circle cx="150" cy="95" r="42" fill="none" stroke="#222" stroke-width="2.5"/>
  
  <!-- Detailed Ears -->
  <ellipse cx="128" cy="75" rx="16" ry="25" fill="#222" transform="rotate(-20, 128, 75)"/>
  <ellipse cx="175" cy="80" rx="16" ry="25" fill="#222" transform="rotate(15, 175, 80)"/>
  
  <!-- Detailed Eyes showing focus -->
  <circle cx="135" cy="100" r="8" fill="white"/>
  <circle cx="165" cy="100" r="8" fill="white"/>
  <circle cx="140" cy="98" r="5" fill="black"/>
  <circle cx="170" cy="98" r="5" fill="black"/>
  <circle cx="142" cy="97" r="2" fill="white"/>
  <circle cx="172" cy="97" r="2" fill="white"/>
  <!-- Focus lines -->
  <path d="M 127 95 L 135 100 L 127 105" fill="none" stroke="#222" stroke-width="1" opacity="0.4"/>
  
  <!-- Detailed Nose -->
  <ellipse cx="150" cy="120" rx="16" ry="11" fill="#222"/>
  <ellipse cx="148" cy="118" rx="6" ry="4" fill="#333"/>
  <ellipse cx="152" cy="118" rx="3" ry="2" fill="white" opacity="0.5"/>
  
  <!-- Intense Expression - Panting mouth -->
  <path d="M 135 130 Q 155 155 175 130" fill="none" stroke="#222" stroke-width="3" stroke-linecap="round"/>
  <!-- Tongue out -->
  <path d="M 160 158 Q 155 170 160 180 Q 165 170 160 158" fill="#ff6b6b" stroke="#c00" stroke-width="1"/>
  <!-- Tongue detail -->
  <path d="M 155 175 Q 152 182 160 185 Q 168 182 165 175" fill="none" stroke="#c00" stroke-width="2"/>
  
  <!-- Detailed Legs in running motion -->
  <!-- Extended front left leg -->
  <rect x="70" y="165" width="18" height="50" rx="8" fill="none" stroke="#222" stroke-width="2.5" transform="rotate(-25, 79, 200)"/>
  <ellipse cx="79" cy="218" rx="10" ry="4" fill="#222" transform="rotate(-25, 79, 218)"/>
  <ellipse cx="74" cy="215" rx="5" ry="2.5" fill="#444" transform="rotate(-25, 74, 215)"/>
  
  <!-- Extended front right leg -->
  <rect x="95" y="168" width="18" height="50" rx="8" fill="none" stroke="#222" stroke-width="2.5" transform="rotate(30, 104, 203)"/>
  <ellipse cx="104" cy="220" rx="10" ry="4" fill="#222" transform="rotate(30, 104, 220)"/>
  <ellipse cx="109" cy="217" rx="5" ry="2.5" fill="#444" transform="rotate(30, 109, 217)"/>
  
  <!-- Extended back left leg -->
  <rect x="125" y="172" width="18" height="48" rx="8" fill="none" stroke="#222" stroke-width="2.5" transform="rotate(10, 134, 202)"/>
  <ellipse cx="134" cy="225" rx="10" ry="4" fill="#222" transform="rotate(10, 134, 225)"/>
  <ellipse cx="139" cy="222" rx="5" ry="2.5" fill="#444" transform="rotate(10, 139, 222)"/>
  
  <!-- Extended back right leg -->
  <rect x="158" y="170" width="18" height="50" rx="8" fill="none" stroke="#222" stroke-width="2.5" transform="rotate(-15, 167, 200)"/>
  <ellipse cx="167" cy="225" rx="10" ry="4" fill="#222" transform="rotate(-15, 167, 225)"/>
  <ellipse cx="172" cy="222" rx="5" ry="2.5" fill="#444" transform="rotate(-15, 172, 222)"/>
  
  <!-- Tail in motion -->
  <path d="M 55 135 Q 40 130 35 150 Q 30 170 50 175 Q 65 170 58 158 Q 54 152 55 135" 
        fill="none" stroke="#222" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <!-- Tail motion blur -->
  <path d="M 45 155 Q 41 158 42 154" fill="none" stroke="#444" stroke-width="1" opacity="0.5"/>
  <path d="M 38 168 Q 42 170 44 166" fill="none" stroke="#444" stroke-width="1" opacity="0.4"/>
</svg>
