<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 250">
  <!-- Complex Playful Pitbull - Professional Coloring Page -->
  <rect x="0" y="0" width="300" height="250" fill="#ffffff"/>

  <!-- Dynamic body - leaping pose -->
  <path d="M 85 170
           Q 75 180 90 192
           Q 105 202 125 198
           T 165 195
           T 200 200
           Q 215 195 210 182
           Q 205 172 188 175
           L 152 178 Z"
        fill="none" stroke="#222222" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Muscle definition lines -->
  <path d="M 95 185 Q 100 187 105 185" fill="none" stroke="#222222" stroke-width="1" opacity="0.6"/>
  <path d="M 115 195 Q 120 193 125 195" fill="none" stroke="#222222" stroke-width="1" opacity="0.6"/>
  <path d="M 140 200 Q 145 198 150 200" fill="none" stroke="#222222" stroke-width="1" opacity="0.6"/>

  <!-- Detailed head in motion -->
  <ellipse cx="150" cy="115" rx="42" ry="38" fill="none" stroke="#222222" stroke-width="2.5"/>

  <!-- Snout -->
  <ellipse cx="165" cy="130" rx="18" ry="14" fill="none" stroke="#222222" stroke-width="2.5"/>

  <!-- Ears flying -->
  <path d="M 125 100
           Q 118 85 130 78
           Q 142 73 148 85
           L 148 102"
        fill="none" stroke="#222222" stroke-width="2.5" stroke-linecap="round" transform="rotate(-15, 125, 100)"/>
  <path d="M 175 105
           Q 185 90 175 78
           Q 165 72 158 85
           L 158 102"
        fill="none" stroke="#222222" stroke-width="2.5" stroke-linecap="round" transform="rotate(20, 175, 105)"/>

  <!-- Eyes excited -->
  <ellipse cx="138" cy="118" rx="6" ry="7" fill="none" stroke="#222222" stroke-width="2"/>
  <circle cx="140" cy="119" r="3" fill="#222222"/>

  <ellipse cx="168" cy="118" rx="6" ry="7" fill="none" stroke="#222222" stroke-width="2"/>
  <circle cx="170" cy="119" r="3" fill="#222222"/>

  <!-- Motion lines near eyes -->
  <path d="M 128 115 L 135 118 L 128 121" fill="none" stroke="#222222" stroke-width="1" opacity="0.4"/>
  <path d="M 172 118 L 180 120 L 172 122" fill="none" stroke="#222222" stroke-width="1" opacity="0.4"/>

  <!-- Nose -->
  <ellipse cx="165" cy="138" rx="14" ry="10" fill="none" stroke="#222222" stroke-width="2.5"/>
  <ellipse cx="163" cy="136" rx="4" ry="3" fill="#222222"/>

  <!-- Barking/open mouth -->
  <path d="M 142 145 Q 160 175 178 145" fill="none" stroke="#222222" stroke-width="3" stroke-linecap="round"/>

  <!-- Tongue playful curl -->
  <path d="M 160 175 Q 157 190 163 198 Q 168 190 165 175" fill="none" stroke="#222222" stroke-width="2"/>
  <path d="M 157 185 Q 152 193 160 195 Q 168 193 163 185" fill="none" stroke="#222222" stroke-width="1.5"/>

  <!-- Front legs extended (front left forward) -->
  <path d="M 112 195
           L 108 240
           Q 108 247 115 247
           L 123 247
           Q 130 247 130 240
           L 130 195"
        fill="none" stroke="#222222" stroke-width="2.5" transform="rotate(-15, 120, 220)"/>

  <!-- Paw pads -->
  <ellipse cx="118" cy="247" rx="8" ry="4" fill="none" stroke="#222222" stroke-width="1.5" transform="rotate(-15, 118, 247)"/>
  <ellipse cx="114" cy="244" rx="4" ry="2" fill="none" stroke="#222222" stroke-width="1" transform="rotate(-15, 114, 244)"/>

  <!-- Front right leg back -->
  <path d="M 140 198
           L 145 243
           Q 145 250 152 250
           L 160 250
           Q 167 250 167 243
           L 167 198"
        fill="none" stroke="#222222" stroke-width="2.5" transform="rotate(20, 152, 225)"/>

  <ellipse cx="153" cy="250" rx="8" ry="4" fill="none" stroke="#222222" stroke-width="1.5" transform="rotate(20, 153, 250)"/>
  <ellipse cx="158" cy="247" rx="4" ry="2" fill="none" stroke="#222222" stroke-width="1" transform="rotate(20, 158, 247)"/>

  <!-- Back left leg back -->
  <path d="M 162 200
           L 168 245
           Q 168 252 175 252
           L 183 252
           Q 190 252 190 245
           L 190 200"
        fill="none" stroke="#222222" stroke-width="2.5" transform="rotate(12, 172, 225)"/>

  <ellipse cx="175" cy="252" rx="8" ry="4" fill="none" stroke="#222222" stroke-width="1.5" transform="rotate(12, 175, 252)"/>
  <ellipse cx="180" cy="249" rx="4" ry="2" fill="none" stroke="#222222" stroke-width="1" transform="rotate(12, 180, 249)"/>

  <!-- Back right leg forward -->
  <path d="M 185 196
           L 182 241
           Q 182 248 189 248
           L 197 248
           Q 204 248 204 241
           L 204 196"
        fill="none" stroke="#222222" stroke-width="2.5" transform="rotate(-8, 193, 221)"/>

  <ellipse cx="191" cy="248" rx="8" ry="4" fill="none" stroke="#222222" stroke-width="1.5" transform="rotate(-8, 191, 248)"/>
  <ellipse cx="195" cy="245" rx="4" ry="2" fill="none" stroke="#222222" stroke-width="1" transform="rotate(-8, 195, 245)"/>

  <!-- Tail in motion -->
  <path d="M 65 158
           Q 48 150 42 165
           Q 36 180 52 185
           Q 62 180 68 170
           Q 72 162 65 158"
        fill="none" stroke="#222222" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Tail motion blur lines -->
  <path d="M 50 168 Q 46 172 47 168" fill="none" stroke="#222222" stroke-width="1" opacity="0.3"/>
  <path d="M 55 178 Q 59 182 60 178" fill="none" stroke="#222222" stroke-width="1" opacity="0.3"/>
</svg>