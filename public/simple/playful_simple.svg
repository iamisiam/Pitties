<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 250">
  <!-- Simple Playful Pitbull - Professional Coloring Page -->
  <rect x="0" y="0" width="300" height="250" fill="#ffffff"/>

  <!-- Body playfully leaning forward -->
  <path d="M 105 145
           Q 95 155 90 170
           L 90 200
           Q 90 210 100 210
           L 195 210
           Q 205 210 205 195
           L 205 160
           Q 200 145 190 140"
        fill="none" stroke="#222222" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Chest highlight -->
  <path d="M 110 155 Q 130 150 150 155" fill="none" stroke="#222222" stroke-width="1.5"/>

  <!-- Head tilted happily -->
  <ellipse cx="165" cy="100" rx="36" ry="32" fill="none" stroke="#222222" stroke-width="2.5"/>

  <!-- Snout happy expression -->
  <ellipse cx="175" cy="110" rx="16" ry="12" fill="none" stroke="#222222" stroke-width="2.5"/>

  <!-- Ears - one perked, one slightly tilted -->
  <path d="M 130 92
           Q 125 82 135 76
           Q 145 72 152 82
           L 152 98"
        fill="none" stroke="#222222" stroke-width="2.5" stroke-linecap="round"/>

  <path d="M 198 92
           Q 205 82 195 76
           Q 185 72 178 82
           L 178 98"
        fill="none" stroke="#222222" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Excited eyes -->
  <ellipse cx="155" cy="98" rx="5" ry="6" fill="none" stroke="#222222" stroke-width="2"/>
  <circle cx="156" cy="98" r="2.5" fill="#222222"/>

  <ellipse cx="178" cy="98" rx="5" ry="6" fill="none" stroke="#222222" stroke-width="2"/>
  <circle cx="179" cy="98" r="2.5" fill="#222222"/>

  <!-- Happy eyebrows arched -->
  <path d="M 146 90 Q 156 88 166 90" fill="none" stroke="#222222" stroke-width="1.5"/>
  <path d="M 182 90 Q 192 88 202 90" fill="none" stroke="#222222" stroke-width="1.5"/>

  <!-- Nose -->
  <ellipse cx="178" cy="118" rx="9" ry="7" fill="none" stroke="#222222" stroke-width="2"/>

  <!-- Open mouth tongue out -->
  <ellipse cx="180" cy="128" rx="12" ry="8" fill="none" stroke="#222222" stroke-width="2"/>
  <path d="M 170 130 Q 180 145 190 130" fill="none" stroke="#222222" stroke-width="2" stroke-linecap="round"/>

  <!-- Tongue -->
  <ellipse cx="180" cy="140" rx="8" ry="5" fill="none" stroke="#222222" stroke-width="2"/>

  <!-- Front legs extended playfully -->
  <path d="M 120 180
           L 118 225
           Q 118 232 125 232
           L 133 232
           Q 140 232 140 225
           L 140 180"
        fill="none" stroke="#222222" stroke-width="2.5" transform="rotate(-8, 130, 205)"/>

  <path d="M 142 180
           L 142 225
           Q 142 232 149 232
           L 157 232
           Q 164 232 164 225
           L 164 180"
        fill="none" stroke="#222222" stroke-width="2.5" transform="rotate(8, 150, 205)"/>

  <!-- Back legs -->
  <path d="M 135 195
           L 135 235
           Q 135 240 140 240
           L 150 240
           Q 155 240 155 235
           L 155 195"
        fill="none" stroke="#222222" stroke-width="2.5"/>

  <path d="M 175 195
           L 175 235
           Q 175 240 180 240
           L 190 240
           Q 195 240 195 235
           L 195 195"
        fill="none" stroke="#222222" stroke-width="2.5"/>
</svg>