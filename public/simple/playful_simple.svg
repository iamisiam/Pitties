<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 250">
  <!-- Simple Playful Pitbull -->
  <rect x="0" y="0" width="300" height="250" fill="#f5f5f5"/>
  
  <!-- Body (leaning forward) -->
  <rect x="75" y="130" width="50" height="45" rx="5" transform="rotate(-10, 100, 152)"/>
  
  <!-- Head (tilted) -->
  <circle cx="155" cy="95" r="30"/>
  
  <!-- Ears (one up, one back) -->
  <ellipse cx="138" cy="78" rx="10" ry="15"/>
  <ellipse cx="175" cy="85" rx="10" ry="15" transform="rotate(20, 180, 85)"/>
  
  <!-- Eyes (excited) -->
  <circle cx="148" cy="92" r="5" fill="white"/>
  <circle cx="168" cy="92" r="5" fill="white"/>
  <circle cx="150" cy="90" r="2" fill="black"/>
  <circle cx="170" cy="90" r="2" fill="black"/>
  
  <!-- Open mouth (tongue out) -->
  <ellipse cx="162" cy="108" rx="12" ry="8" fill="#ffb6c1"/>
  <path d="M 152 112 L 162 125 L 172 112" fill="none" stroke="#c00" stroke-width="2"/>
  
  <!-- Front Legs (extended) -->
  <rect x="85" y="170" width="12" height="38" rx="3" transform="rotate(-8, 91, 189)"/>
  <rect x="103" y="168" width="12" height="42" rx="3" transform="rotate(8, 109, 189)"/>
  
  <!-- Back Legs -->
  <rect x="135" y="170" width="12" height="38" rx="3"/>
  <rect x="153" y="168" width="12" height="42" rx="3"/>
</svg>
