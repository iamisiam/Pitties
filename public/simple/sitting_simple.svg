<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 250">
  <!-- Simple Sitting Pitbull -->
  <rect x="0" y="0" width="300" height="250" fill="#f5f5f5"/>
  
  <!-- Body -->
  <rect x="80" y="140" width="60" height="40" rx="5"/>
  
  <!-- Head -->
  <circle cx="160" cy="100" r="35"/>
  
  <!-- Ears -->
  <ellipse cx="140" cy="80" rx="12" ry="18"/>
  <ellipse cx="180" cy="80" rx="12" ry="18"/>
  
  <!-- Eyes -->
  <circle cx="150" cy="95" r="6" fill="white"/>
  <circle cx="170" cy="95" r="6" fill="white"/>
  <circle cx="152" cy="93" r="3" fill="black"/>
  <circle cx="172" cy="93" r="3" fill="black"/>
  
  <!-- Nose -->
  <ellipse cx="160" cy="110" rx="10" ry="6"/>
  
  <!-- Mouth -->
  <path d="M 155 115 Q 160 125 165 115" fill="none"/>
  
  <!-- Front Legs -->
  <rect x="90" y="180" width="15" height="35" rx="3"/>
  <rect x="105" y="180" width="15" height="35" rx="3"/>
  
  <!-- Back Legs -->
  <rect x="130" y="180" width="15" height="35" rx="3"/>
  <rect x="145" y="180" width="15" height="35" rx="3"/>
</svg>