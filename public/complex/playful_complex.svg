<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 250">
  <!-- Complex Playful Pitbull with Action Pose -->
  <rect x="0" y="0" width="300" height="250" fill="#f5f5f5"/>
  
  <!-- Dynamic Body Pose - Leaping -->
  <path d="M 80 160 Q 70 170 85 180 Q 100 190 120 185 T 160 180 T 190 185 Q 210 180 205 170 Q 200 165 185 168 L 150 170 Z" 
        fill="none" stroke="#222" stroke-width="2.5" opacity="0.8"/>
  
  <!-- Detailed Head in motion -->
  <circle cx="150" cy="110" r="40" fill="none" stroke="#222" stroke-width="2.5"/>
  
  <!-- Detailed Ears in motion -->
  <ellipse cx="130" cy="90" rx="15" ry="22" fill="#222" transform="rotate(-15, 130, 90)"/>
  <ellipse cx="175" cy="95" rx="15" ry="22" fill="#222" transform="rotate(25, 175, 95)"/>
  
  <!-- Detailed Eyes with motion lines -->
  <circle cx="138" cy="105" r="7" fill="white"/>
  <circle cx="168" cy="105" r="7" fill="white"/>
  <circle cx="142" cy="103" r="4" fill="black"/>
  <circle cx="172" cy="103" r="4" fill="black"/>
  <!-- Motion blur effect -->
  <path d="M 125 100 L 132 103 L 125 106" fill="none" stroke="#222" stroke-width="1" opacity="0.5"/>
  <path d="M 162 103 L 170 105 L 162 107" fill="none" stroke="#222" stroke-width="1" opacity="0.5"/>
  
  <!-- Detailed Nose with highlight -->
  <ellipse cx="148" cy="122" rx="15" ry="10" fill="#222"/>
  <ellipse cx="146" cy="120" rx="5" ry="3" fill="#333"/>
  <ellipse cx="150" cy="122" rx="3" ry="2" fill="white" opacity="0.5"/>
  
  <!-- Complex Expression - Open mouth barking -->
  <path d="M 138 130 Q 155 160 172 130" fill="none" stroke="#222" stroke-width="3" stroke-linecap="round"/>
  <!-- Tongue detailed -->
  <path d="M 155 160 Q 152 175 155 185 Q 158 175 155 160" fill="#ff6b6b" stroke="#c00" stroke-width="1"/>
  <!-- Tongue curl detail -->
  <path d="M 152 170 Q 148 178 155 185" fill="none" stroke="#c00" stroke-width="2"/>
  
  <!-- Detailed Legs in running pose -->
  <!-- Front left leg extended forward -->
  <rect x="75" y="175" width="16" height="45" rx="6" fill="none" stroke="#222" stroke-width="2" transform="rotate(-20, 83, 202)"/>
  <ellipse cx="83" cy="225" rx="9" ry="4" fill="#222" transform="rotate(-20, 83, 225)"/>
  <!-- Paw pads -->
  <ellipse cx="78" cy="222" rx="4" ry="2" fill="#444" transform="rotate(-20, 78, 222)"/>
  
  <!-- Front right leg extended back -->
  <rect x="108" y="180" width="16" height="42" rx="6" fill="none" stroke="#222" stroke-width="2" transform="rotate(25, 116, 206)"/>
  <ellipse cx="116" cy="227" rx="9" ry="4" fill="#222" transform="rotate(25, 116, 227)"/>
  <ellipse cx="121" cy="224" rx="4" ry="2" fill="#444" transform="rotate(25, 121, 224)"/>
  
  <!-- Back left leg extended back -->
  <rect x="132" y="182" width="16" height="42" rx="6" fill="none" stroke="#222" stroke-width="2" transform="rotate(15, 140, 208)"/>
  <ellipse cx="140" cy="229" rx="9" ry="4" fill="#222" transform="rotate(15, 140, 229)"/>
  <ellipse cx="145" cy="226" rx="4" ry="2" fill="#444" transform="rotate(15, 145, 226)"/>
  
  <!-- Back right leg extended forward -->
  <rect x="168" y="178" width="16" height="45" rx="6" fill="none" stroke="#222" stroke-width="2" transform="rotate(-10, 176, 205)"/>
  <ellipse cx="176" cy="228" rx="9" ry="4" fill="#222" transform="rotate(-10, 176, 228)"/>
  <ellipse cx="181" cy="225" rx="4" ry="2" fill="#444" transform="rotate(-10, 181, 225)"/>
  
  <!-- Tail in motion -->
  <path d="M 60 140 Q 40 130 30 150 Q 25 165 45 170 Q 55 165 60 155 Q 65 150 60 140" 
        fill="none" stroke="#222" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <!-- Tail motion blur -->
  <path d="M 48 160 Q 44 163 45 158" fill="none" stroke="#444" stroke-width="1" opacity="0.4"/>
  <path d="M 52 168 Q 56 171 57 166" fill="none" stroke="#444" stroke-width="1" opacity="0.4"/>
</svg>
