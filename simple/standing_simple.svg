<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 250">
  <!-- Simple Standing Pitbull - Professional Coloring Page -->
  <rect x="0" y="0" width="300" height="250" fill="#ffffff"/>

  <!-- Body -->
  <path d="M 100 120
           Q 90 130 85 150
           L 85 200
           Q 85 210 95 210
           L 205 210
           Q 215 210 215 200
           L 215 150
           Q 210 130 200 120"
        fill="none" stroke="#222222" stroke-width="2.5"/>

  <!-- Belly curve -->
  <path d="M 110 190 Q 160 200 210 190"
        fill="none" stroke="#222222" stroke-width="1.5"/>

  <!-- Head -->
  <ellipse cx="160" cy="90" rx="36" ry="33" fill="none" stroke="#222222" stroke-width="2.5"/>

  <!-- Snout -->
  <ellipse cx="160" cy="110" rx="16" ry="12" fill="none" stroke="#222222" stroke-width="2.5"/>

  <!-- Ears - pricked -->
  <path d="M 128 85
           L 122 60
           Q 120 50 130 48
           L 135 70"
        fill="none" stroke="#222222" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 172 85
           L 178 60
           Q 180 50 170 48
           L 165 70"
        fill="none" stroke="#222222" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Eyes alert -->
  <ellipse cx="148" cy="85" rx="5" ry="6" fill="none" stroke="#222222" stroke-width="2"/>
  <circle cx="149" cy="85" r="2.5" fill="#222222"/>

  <ellipse cx="172" cy="85" rx="5" ry="6" fill="none" stroke="#222222" stroke-width="2"/>
  <circle cx="173" cy="85" r="2.5" fill="#222222"/>

  <!-- Eyebrows -->
  <path d="M 140 76 L 156 74" stroke="#222222" stroke-width="1.5" fill="none"/>
  <path d="M 160 74 L 176 76" stroke="#222222" stroke-width="1.5" fill="none"/>

  <!-- Nose -->
  <ellipse cx="160" cy="115" rx="9" ry="7" fill="none" stroke="#222222" stroke-width="2"/>

  <!-- Mouth slight smile -->
  <path d="M 148 122 Q 160 128 172 122"
        fill="none" stroke="#222222" stroke-width="2" stroke-linecap="round"/>

  <!-- Front legs -->
  <path d="M 115 165
           L 115 215
           Q 115 220 120 220
           L 130 220
           Q 135 220 135 215
           L 135 165"
        fill="none" stroke="#222222" stroke-width="2.5"/>

  <path d="M 165 165
           L 165 215
           Q 165 220 170 220
           L 180 220
           Q 185 220 185 215
           L 185 165"
        fill="none" stroke="#222222" stroke-width="2.5"/>

  <!-- Back legs -->
  <path d="M 100 190
           L 100 235
           Q 100 240 105 240
           L 120 240
           Q 125 240 125 235
           L 125 190"
        fill="none" stroke="#222222" stroke-width="2.5"/>

  <path d="M 175 190
           L 175 235
           Q 175 240 180 240
           L 195 240
           Q 200 240 200 235
           L 200 190"
        fill="none" stroke="#222222" stroke-width="2.5"/>
</svg>